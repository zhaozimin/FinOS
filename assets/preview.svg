  <rect x="288" y="166" width="12" height="280" rx="4" fill="#2DD4BF"/>
  <rect x="620" y="176" width="12" height="82" rx="4" fill="#3B82F6"/>
  <rect x="620" y="270" width="12" height="88" rx="4" fill="#3B82F6"/>
  <rect x="620" y="370" width="12" height="76" rx="4" fill="#60A5FA"/>
  <rect x="1104" y="168" width="12" height="45" rx="4" fill="#F59E0B"/>
  <rect x="1104" y="222" width="12" height="56" rx="4" fill="#FB923C"/>
  <rect x="1104" y="288" width="12" height="60" rx="4" fill="#F59E0B"/>
  <rect x="1104" y="358" width="12" height="42" rx="4" fill="#FBBF24"/>
  <rect x="1104" y="418" width="12" height="36" rx="4" fill="#FB923C"/>

  <!-- KPI cards -->
  <g font-family="'SF Pro Text','Segoe UI',Arial,sans-serif">
