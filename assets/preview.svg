    <rect x="248" y="516" width="288" height="200" rx="14" fill="#0E1524" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <circle cx="500" cy="548" r="14" fill="#10B981" fill-opacity="0.16"/><circle cx="500" cy="548" r="4.5" fill="#34D399"/>
    <text x="276" y="554" font-size="14" fill="#94A3B8">净资产</text>
    <text x="276" y="606" font-size="38" font-weight="800" fill="#F8FAFC">¥128,640</text>
    <text x="276" y="640" font-size="13" fill="#34D399">▲ 可撑 18.3 个月</text>
    <rect x="276" y="664" width="232" height="6" rx="3" fill="#1E293B"/>
    <rect x="276" y="664" width="176" height="6" rx="3" fill="#10B981"/>
    <!-- card 2 -->
    <rect x="556" y="516" width="288" height="200" rx="14" fill="#0E1524" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <circle cx="808" cy="548" r="14" fill="#3B82F6" fill-opacity="0.16"/><circle cx="808" cy="548" r="4.5" fill="#60A5FA"/>
    <text x="584" y="554" font-size="14" fill="#94A3B8">工作账户</text>
    <text x="584" y="606" font-size="38" font-weight="800" fill="#F8FAFC">¥86,200</text>
    <text x="584" y="640" font-size="13" fill="#60A5FA">本月 +¥12,400</text>
    <rect x="584" y="664" width="232" height="6" rx="3" fill="#1E293B"/>
    <rect x="584" y="664" width="150" height="6" rx="3" fill="#3B82F6"/>
    <!-- card 3 -->
    <rect x="864" y="516" width="288" height="200" rx="14" fill="#0E1524" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <circle cx="1116" cy="548" r="14" fill="#F59E0B" fill-opacity="0.16"/><circle cx="1116" cy="548" r="4.5" fill="#FBBF24"/>
    <text x="892" y="554" font-size="14" fill="#94A3B8">生活账户</text>
    <text x="892" y="606" font-size="38" font-weight="800" fill="#F8FAFC">¥42,440</text>
    <text x="892" y="640" font-size="13" fill="#FBBF24">本月 −¥3,180</text>
    <rect x="892" y="664" width="232" height="6" rx="3" fill="#1E293B"/>
    <rect x="892" y="664" width="96" height="6" rx="3" fill="#F59E0B"/>
