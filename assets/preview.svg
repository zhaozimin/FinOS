  <g>
    <path d="M300,168 C460,168 460,176 620,176 L620,258 C460,258 460,260 300,260 Z" fill="url(#gTB)" opacity="0.5"/>
    <path d="M300,262 C460,262 460,270 620,270 L620,358 C460,358 460,352 300,352 Z" fill="url(#gTB)" opacity="0.5"/>
    <path d="M300,354 C460,354 460,370 620,370 L620,446 C460,446 460,444 300,444 Z" fill="url(#gTB)" opacity="0.5"/>
  </g>
  <!-- bands accounts -> categories -->
