<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FinOS 仪表盘预览（示意数据）">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F17"/><stop offset="1" stop-color="#0A1220"/>
    </linearGradient>
    <linearGradient id="gTB" x1="300" y1="0" x2="632" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/><stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gBC" x1="632" y1="0" x2="1104" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="1198" height="758" rx="20" fill="url(#pbg)"/>
  <rect x="1.5" y="1.5" width="1197" height="757" rx="19.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.07"/>

  <!-- sidebar -->
  <rect x="1" y="1" width="207" height="758" rx="20" fill="#0E1420"/>
  <rect x="188" y="1" width="20" height="758" fill="#0E1420"/>
  <line x1="208" y1="1" x2="208" y2="759" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <text x="28" y="54" font-family="'SF Pro Display','Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" letter-spacing="-1" fill="#F8FAFC">FinOS</text>
  <circle cx="112" cy="46" r="5" fill="#F59E0B"/>

  <!-- nav -->
  <g font-family="'SF Pro Text','Segoe UI',Arial,sans-serif" font-size="14" font-weight="600">
    <rect x="16" y="98" width="176" height="40" rx="10" fill="#F59E0B" fill-opacity="0.14"/>
    <rect x="30" y="110" width="16" height="16" rx="4" fill="#F59E0B"/>
    <text x="58" y="123" fill="#FCD34D">资金流量</text>
    <rect x="30" y="158" width="16" height="16" rx="4" fill="#64748B"/>
    <text x="58" y="171" fill="#94A3B8">财务状况</text>
    <rect x="30" y="206" width="16" height="16" rx="4" fill="#64748B"/>
    <text x="58" y="219" fill="#94A3B8">资金流水</text>
    <rect x="30" y="254" width="16" height="16" rx="4" fill="#64748B"/>
    <text x="58" y="267" fill="#94A3B8">财务设置</text>
  </g>
  <rect x="24" y="702" width="160" height="34" rx="9" fill="#3B82F6" fill-opacity="0.12" stroke="#3B82F6" stroke-opacity="0.3"/>
  <circle cx="42" cy="719" r="4" fill="#34D399"/>
  <text x="56" y="724" font-family="'SF Pro Text','Segoe UI',Arial,sans-serif" font-size="12" fill="#93C5FD">连接状态 · 已连接</text>

  <!-- header -->
  <text x="248" y="58" font-family="'SF Pro Display','Segoe UI',Arial,sans-serif" font-size="24" font-weight="700" fill="#F8FAFC">全局资金流</text>
  <text x="248" y="84" font-family="'SF Pro Text','Segoe UI',Arial,sans-serif" font-size="13" fill="#64748B">按资金来源、账户、项目、分类之间的流量关系 · 示意数据</text>
  <g font-family="'SF Pro Text','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600">
    <rect x="946" y="40" width="206" height="30" rx="8" fill="#131A26" stroke="#FFFFFF" stroke-opacity="0.07"/>
    <rect x="950" y="44" width="66" height="22" rx="6" fill="#F59E0B" fill-opacity="0.9"/>
    <text x="983" y="59" text-anchor="middle" fill="#1A1206">全部资金流</text>
    <text x="1052" y="59" text-anchor="middle" fill="#94A3B8">工作</text>
    <text x="1116" y="59" text-anchor="middle" fill="#94A3B8">生活</text>
  </g>

  <!-- sankey panel -->
  <rect x="248" y="108" width="904" height="384" rx="14" fill="#0E1524" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <g font-family="'SF Pro Text','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600">
    <circle cx="270" cy="138" r="4" fill="#2DD4BF"/><text x="282" y="142" fill="#94A3B8">资金来源</text>
    <circle cx="360" cy="138" r="4" fill="#3B82F6"/><text x="372" y="142" fill="#94A3B8">账户</text>
    <circle cx="428" cy="138" r="4" fill="#F59E0B"/><text x="440" y="142" fill="#94A3B8">分类</text>
  </g>

