    <path d="M632,176 C868,176 868,168 1104,168 L1104,213 C868,213 868,214 632,214 Z" fill="url(#gBC)" opacity="0.46"/>
    <path d="M632,214 C868,214 868,222 1104,222 L1104,278 C868,278 868,258 632,258 Z" fill="url(#gBC)" opacity="0.46"/>
    <path d="M632,270 C868,270 868,288 1104,288 L1104,348 C868,348 868,312 632,314 Z" fill="url(#gBC)" opacity="0.46"/>
    <path d="M632,314 C868,314 868,358 1104,358 L1104,400 C868,400 868,352 632,358 Z" fill="url(#gBC)" opacity="0.46"/>
    <path d="M632,370 C868,370 868,418 1104,418 L1104,454 C868,454 868,446 632,446 Z" fill="url(#gBC)" opacity="0.46"/>
  </g>

